name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true # No queremos que falle el CI por lint ahora

      - name: Run tests
        run: npm test

      - name: Build bundle
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist/index.js)" ]; then
            echo "Error: El archivo dist/index.js no está actualizado. Ejecuta 'npm run build' y commitea los cambios."
            exit 1
          fi
